name: Repo Intelligence Benchmarks

on:
  push:
    branches: [main]
    paths:
      - "packages/code-index/src/**"
      - "packages/code-index/package.json"
  pull_request:
    branches: [main]
    paths:
      - "packages/code-index/src/**"
      - "packages/code-index/package.json"

# Non-blocking: this workflow does not block merges.
# It reports results as a PR comment and as a CI badge that can be ignored.
concurrency:
  group: bench-${{ github.ref }}
  cancel-in-concurrency: true

jobs:
  bench-repo-map:
    name: Repo Intelligence Benchmarks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/code-index

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build code-index
        run: pnpm build

      - name: Run benchmarks
        run: npx tsx src/bench/runner.ts
        id: bench

      - name: Comment PR with results
        if: github.event == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const results = require('./packages/code-index/src/bench/results.json');
            const passed = results.results.filter(r => r.passed).length;
            const total = results.results.length;
            const body = `## Repo Intelligence Benchmarks (non-blocking)

| Fixture | Status | Cold Index | Incremental | Selection | Memory | Token Acc | Watch |
|---------|--------|------------|-------------|-----------|--------|-----------|-------|
            ${results.results.map(r => `| ${r.fixture} | ${r.passed ? '✅ PASS' : '❌ FAIL'} | ${r.metrics.coldIndexMs}ms | ${r.metrics.incrementalIndexMs}ms | ${r.metrics.selectionMs}ms | ${r.metrics.memoryMb}MB | ±${(r.metrics.tokenEstimateAccuracy * 100).toFixed(1)}% | ${r.metrics.watchEventLatencyMs ?? 'N/A'}ms |`).join('\n')}

**${passed}/${total} fixtures passed** — Total runtime: ${results.totalDurationMs}ms
Benchmark runner: \`npm run bench:repo-map\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Upload benchmark results artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: packages/code-index/src/bench/results.json
          retention-days: 30

      - name: Fail if benchmarks regressed
        if: always()
        run: |
          # Parse results and fail if any fixture regressed
          node -e "
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('src/bench/results.json', 'utf-8'));
            const failed = results.results.filter(r => !r.passed);
            if (failed.length > 0) {
              console.error('Benchmarks failed for:', failed.map(r => r.fixture).join(', '));
              process.exit(1);
            }
            console.log('All benchmarks passed');
          "