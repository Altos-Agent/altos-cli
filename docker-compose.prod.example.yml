name: base-orchestrator-prod-example

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/tls:/etc/nginx/tls:ro
    networks:
      - frontend

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4100
      DATABASE_URL: postgresql://base_orchestrator:${POSTGRES_PASSWORD:-change-me-db-password}@postgres:5432/base_orchestrator
      REDIS_URL: redis://redis:6379
      DEMO_MODE: "true"
      DRY_RUN: "true"
      REQUIRE_LIVE_CONFIRMATION: "true"
      ALLOW_UNLIMITED_APPROVAL: "false"
      AUTO_APPROVE: "false"
      SCHEDULER_LIVE_EXECUTION: "false"
      QUOTE_PROVIDER: mock
      OPERATOR_USERNAME: ${OPERATOR_USERNAME:-operator}
      OPERATOR_PASSWORD_HASH: ${OPERATOR_PASSWORD_HASH:-argon2id-placeholder-generate-with-pnpm-auth-hash-password}
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-session-secret-before-any-server-use}
      MASTER_KEY_FILE: /var/lib/base-orchestrator/master.key
      BASE_RPC_URL: ${BASE_RPC_URL:-https://mainnet.base.org}
      TELEGRAM_ENABLED: "false"
    volumes:
      - api-vault:/var/lib/base-orchestrator
    expose:
      - "4100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4100/health').then(async r=>{const b=await r.json().catch(()=>({ok:false})); process.exit(r.ok&&b.ok?0:1)}).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3100
      HOSTNAME: 0.0.0.0
      INTERNAL_API_BASE_URL: http://api:4100
    expose:
      - "3100"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3100').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: base_orchestrator
      POSTGRES_USER: base_orchestrator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - backend
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U base_orchestrator -d base_orchestrator"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  api-vault:

networks:
  frontend:
  backend:
    internal: true
